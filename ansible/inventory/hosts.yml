all:
  children:
    main:
      hosts:
        pangolin-server:
          ansible_host: "{{ server_ip }}"
    embeddings:
      hosts:
        embeddings-server:
          ansible_host: "{{ embeddings_server_ip }}"
  vars:
    ansible_python_interpreter: /usr/bin/python3
    ansible_user: "{{ server_user }}"
    ansible_ssh_private_key_file: "{{ server_key }}"
