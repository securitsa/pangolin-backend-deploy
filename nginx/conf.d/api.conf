upstream identity_backend {
    server pangolin-identity-service:8000;
}

upstream dialogue_backend {
    server pangolin-dialogue-service:8000;
}

upstream pulse_backend {
    server pangolin-pulse-service:8000;
}

upstream centrifugo_backend {
    server pangolin-centrifugo:8000;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name staging.pangolin.live;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /nginx-health {
        access_log off;
        return 200 "ok";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name staging.pangolin.live;

    ssl_certificate /etc/letsencrypt/live/staging.pangolin.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.pangolin.live/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Identity service API
    location /api/identity/ {
        proxy_pass http://identity_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Dialogue service API
    location /api/dialogue/ {
        proxy_pass http://dialogue_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Pulse service API
    location /api/pulse/ {
        proxy_pass http://pulse_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Centrifugo WebSocket
    location /connection/websocket {
        proxy_pass http://centrifugo_backend/connection/websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Centrifugo API (internal, restrict access)
    location /api/centrifugo/ {
        proxy_pass http://centrifugo_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
