name: pangolin-infra

services:
  postgres:
    image: postgres:17.4
    container_name: pangolin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../configs/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pangolin-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: pangolin-redis
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--requirepass", "${REDIS_PASSWORD}",
        "--maxmemory", "256mb",
        "--maxmemory-policy", "allkeys-lru"
      ]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pangolin-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  centrifugo:
    image: centrifugo/centrifugo:v5
    container_name: pangolin-centrifugo
    restart: unless-stopped
    command: centrifugo -c /centrifugo/config.json
    volumes:
      - ../configs/centrifugo/config.json:/centrifugo/config.json:ro
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pangolin-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  rabbitmq:
    image: rabbitmq:3.12.14-management
    container_name: pangolin-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - pangolin-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: pangolin-qdrant
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - pangolin-network

  portainer:
    image: portainer/portainer-ce:alpine
    container_name: pangolin-portainer
    restart: unless-stopped
    # no --base-url, nginx handles path rewriting
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer-data:/data
    networks:
      - pangolin-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  qdrant-data:
  portainer-data:

networks:
  pangolin-network:
    name: pangolin-network
    driver: bridge
