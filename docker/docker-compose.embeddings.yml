name: pangolin-embeddings

services:
  embeddings-inference:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.7
    container_name: pangolin-embeddings-inference
    restart: unless-stopped
    command:
      [
        "--model-id", "intfloat/multilingual-e5-large-instruct",
        "--auto-truncate",
        "--max-client-batch-size", "64"
      ]
    volumes:
      - embeddings-data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - embeddings-network

  nginx:
    image: nginx:1.27-alpine
    container_name: pangolin-embeddings-nginx
    restart: unless-stopped
    volumes:
      - ../nginx/embeddings/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/embeddings/conf.d:/etc/nginx/conf.d:ro
      - /var/www/certbot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - embeddings-network

  certbot:
    image: certbot/certbot:latest
    container_name: pangolin-embeddings-certbot
    volumes:
      - /var/www/certbot:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    networks:
      - embeddings-network

volumes:
  embeddings-data:

networks:
  embeddings-network:
    name: embeddings-network
    driver: bridge
